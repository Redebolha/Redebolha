<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Rede Bolha — Painel Administrativo</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600;700&family=Oswald:wght@300;400;500;600&display=swap');
:root{
  --bg:#0A0A0C;--bg2:#121013;--card:#1A171B;--card2:#221E24;
  --gold:#C9A24B;--gold-l:#E7CE8A;--gold-d:#9A7A30;
  --wine:#6B2737;--wine-l:#9A3A4C;
  --txt:#F1ECE3;--body:#C6C0B5;--dim:#857F75;
  --line:rgba(201,162,75,.18);--line2:rgba(201,162,75,.30);
  --ok:#4CA36B;--warn:#D9A441;--err:#C25B5B;
  --radius:12px;--sidebar:264px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--body);font-family:'Inter',system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--gold-l);text-decoration:none}
a:hover{color:var(--gold)}
img{max-width:100%}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.hidden{display:none!important}
.serif{font-family:'Cormorant Garamond',Georgia,serif}
.oswald{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.14em}
/* ---- Botoes ---- */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:.8rem;font-weight:600;border:none;border-radius:8px;padding:13px 22px;background:linear-gradient(180deg,var(--gold-l),var(--gold-d));color:#1a1206;transition:filter .2s}
.btn:hover{filter:brightness(1.08)}
.btn.ghost{background:transparent;border:1px solid var(--line2);color:var(--body)}
.btn.ghost:hover{color:var(--gold);border-color:var(--gold)}
.btn.danger{background:transparent;border:1px solid var(--err);color:var(--err)}
.btn.danger:hover{background:var(--err);color:#fff}
.btn.sm{padding:8px 14px;font-size:.7rem}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
/* ---- Login ---- */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:420px;background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:40px 34px}
.login-card .brand{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:.9rem;color:var(--txt);text-align:center;display:block;margin-bottom:6px}
.login-card .brand b{color:var(--gold)}
.login-card h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.9rem;color:var(--txt);text-align:center;margin-bottom:6px}
.login-card .sub{text-align:center;color:var(--dim);font-size:.9rem;margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:.82rem;color:var(--body);margin-bottom:7px;font-weight:500}
.field input,.field textarea,.field select{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:12px 14px;color:var(--txt);font-size:.95rem}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold);outline:none}
.pwd-wrap{position:relative}
.pwd-wrap button{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--dim);font-size:.75rem;padding:6px}
.remember{display:flex;align-items:center;gap:9px;font-size:.85rem;margin-bottom:20px;color:var(--body)}
.remember input{width:auto}
.login-help{font-size:.8rem;color:var(--dim);margin-top:18px;line-height:1.6}
.msg{border-radius:9px;padding:11px 14px;font-size:.85rem;margin-bottom:16px}
.msg.err{background:rgba(194,91,91,.12);border:1px solid var(--err);color:#e79b9b}
.msg.ok{background:rgba(76,163,107,.12);border:1px solid var(--ok);color:#8fd0a6}
/* ---- App layout ---- */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--line);padding:22px 0;overflow-y:auto;z-index:40;transition:transform .25s}
.sidebar .brand{display:block;padding:0 24px 20px;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:.82rem;color:var(--txt);border-bottom:1px solid var(--line)}
.sidebar .brand b{color:var(--gold)}
.nav{padding:14px 12px}
.nav a{display:flex;align-items:center;gap:13px;padding:11px 14px;border-radius:9px;color:var(--body);font-size:.92rem;margin-bottom:2px;transition:background .15s}
.nav a .ico{width:20px;text-align:center;font-size:1.05rem}
.nav a:hover{background:var(--card);color:var(--txt)}
.nav a.active{background:var(--card2);color:var(--gold);font-weight:500}
.nav .sep{border-top:1px solid var(--line);margin:12px 6px}
.main{margin-left:var(--sidebar);min-height:100vh}
.topbar{position:sticky;top:0;background:rgba(10,10,12,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:16px 30px;display:flex;align-items:center;justify-content:space-between;z-index:30}
.topbar h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;color:var(--txt)}
.hamburger{display:none;background:none;border:1px solid var(--line2);border-radius:8px;color:var(--txt);font-size:1.2rem;padding:6px 11px}
.content{padding:30px}
/* ---- Cards / dashboard ---- */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:26px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
.stat .num{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:var(--gold-l);line-height:1;margin-bottom:6px}
.stat .lbl{font-size:.82rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:22px}
.panel h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.3rem;color:var(--txt);margin-bottom:16px}
.hero-cta{background:linear-gradient(135deg,var(--bg2),var(--card2));border:1px solid var(--line2);border-radius:var(--radius);padding:28px;margin-bottom:26px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px}
.hero-cta h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.6rem;color:var(--txt)}
.hero-cta p{color:var(--dim);font-size:.92rem;margin-top:4px}
/* ---- Tabela / listagem ---- */
.toolbar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.toolbar input[type=search],.toolbar select{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:10px 14px;color:var(--txt);font-size:.9rem}
.toolbar input[type=search]{min-width:220px;flex:1}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:13px 12px;border-bottom:1px solid var(--line);font-size:.9rem}
th{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:.72rem;color:var(--dim);font-weight:500}
tr:hover td{background:var(--card2)}
.badge{display:inline-block;font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:.66rem;padding:4px 9px;border-radius:20px;border:1px solid var(--line2)}
.badge.pub{color:var(--ok);border-color:var(--ok)}
.badge.rasc{color:var(--dim)}
.badge.rev{color:var(--warn);border-color:var(--warn)}
.badge.agend{color:var(--gold);border-color:var(--gold)}
.thumb{width:52px;height:38px;border-radius:6px;object-fit:cover;background:var(--card2);border:1px solid var(--line)}
.row-actions{position:relative}
.row-actions .menu{position:absolute;right:0;top:100%;background:var(--card2);border:1px solid var(--line2);border-radius:9px;padding:6px;min-width:150px;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.row-actions .menu button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--body);padding:9px 12px;border-radius:6px;font-size:.85rem}
.row-actions .menu button:hover{background:var(--card);color:var(--txt)}
.row-actions .menu button.del:hover{color:var(--err)}
.empty{text-align:center;color:var(--dim);padding:50px 20px}
/* ---- Editor ---- */
.editor-top{position:sticky;top:0;background:rgba(10,10,12,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;z-index:35}
.editor-top .save-status{font-size:.8rem;color:var(--dim);margin-left:auto}
.editor-top .save-status.saved{color:var(--ok)}
.editor-wrap{display:grid;grid-template-columns:1fr 340px;gap:0;min-height:calc(100vh - 58px)}
.editor-canvas{padding:34px 40px;max-width:820px;margin:0 auto;width:100%}
.editor-side{border-left:1px solid var(--line);background:var(--bg2);padding:24px;overflow-y:auto}
.editor-side h4{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.1em;font-size:.74rem;color:var(--gold);margin:22px 0 12px}
.editor-side h4:first-child{margin-top:0}
.ti{background:transparent;border:none;color:var(--txt);width:100%;font-family:'Cormorant Garamond',serif;font-weight:600;font-size:2.2rem;line-height:1.1;margin-bottom:10px}
.ti::placeholder{color:var(--dim)}
.ti.eyebrow-in{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:.2em;font-size:.8rem;color:var(--gold)}
.ti.sub-in{font-size:1.3rem;font-style:italic;color:var(--body)}
/* blocks */
.block{position:relative;border:1px solid transparent;border-radius:8px;padding:6px 10px;margin-bottom:6px}
.block:hover{border-color:var(--line)}
.block.sel{border-color:var(--line2);background:rgba(201,162,75,.04)}
.block[contenteditable],.block .editable{outline:none;min-height:1.4em}
.block-para{font-size:1.06rem;line-height:1.75}
.block-h2{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.75rem;color:var(--txt)}
.block-quote{border-left:2px solid var(--wine-l);padding-left:20px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.4rem;color:var(--gold-l)}
.block-ctrls{position:absolute;left:-42px;top:6px;display:none;flex-direction:column;gap:3px}
.block:hover .block-ctrls,.block.sel .block-ctrls{display:flex}
.block-ctrls button{background:var(--card2);border:1px solid var(--line);color:var(--dim);width:28px;height:26px;border-radius:6px;font-size:.8rem;display:flex;align-items:center;justify-content:center}
.block-ctrls button:hover{color:var(--gold);border-color:var(--gold)}
.add-block{width:100%;border:1px dashed var(--line2);background:transparent;color:var(--dim);border-radius:9px;padding:12px;margin-top:10px;font-size:.9rem}
.add-block:hover{color:var(--gold);border-color:var(--gold)}
.block-menu{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px;padding:14px;background:var(--card);border:1px solid var(--line);border-radius:10px}
.block-menu button{background:var(--card2);border:1px solid var(--line);color:var(--body);border-radius:8px;padding:12px 8px;font-size:.8rem;display:flex;flex-direction:column;align-items:center;gap:6px}
.block-menu button:hover{color:var(--gold);border-color:var(--gold)}
.block-menu .ico{font-size:1.2rem}
.fmt-toolbar{display:flex;gap:4px;flex-wrap:wrap;padding:8px;background:var(--card2);border:1px solid var(--line);border-radius:9px;margin-bottom:14px;position:sticky;top:58px;z-index:20}
.fmt-toolbar button{background:none;border:1px solid transparent;color:var(--body);width:34px;height:32px;border-radius:6px;font-size:.9rem}
.fmt-toolbar button:hover{background:var(--card);border-color:var(--line)}
.wordcount{font-size:.78rem;color:var(--dim);margin-top:16px;text-align:right}
/* Modal / preview */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal.wide{max-width:1100px}
.modal h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:1.5rem;color:var(--txt);margin-bottom:8px}
.modal .close{float:right;background:none;border:none;color:var(--dim);font-size:1.4rem}
.preview-frame{width:100%;border:1px solid var(--line);border-radius:10px;background:#fff;height:70vh}
.dev-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.dev-tabs button{background:var(--card);border:1px solid var(--line);color:var(--body);border-radius:8px;padding:8px 16px;font-size:.82rem}
.dev-tabs button.active{color:var(--gold);border-color:var(--gold)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--line2);border-radius:10px;padding:14px 20px;color:var(--txt);font-size:.9rem;z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:340px}
.toast.ok{border-color:var(--ok)}
.toast.err{border-color:var(--err)}
.a11y-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:.88rem}
.a11y-item.ok{color:var(--ok)}
.a11y-item.warn{color:var(--warn)}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--card2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:.8rem;display:flex;align-items:center;gap:6px}
.chip button{background:none;border:none;color:var(--dim);font-size:.9rem}
.seo-preview{background:var(--card2);border:1px solid var(--line);border-radius:9px;padding:14px}
.seo-preview .g-title{color:#8ab4f8;font-size:1.05rem;margin-bottom:3px}
.seo-preview .g-url{color:var(--ok);font-size:.8rem}
.seo-preview .g-desc{color:var(--dim);font-size:.85rem;margin-top:4px}
/* Responsivo */
@media(max-width:900px){
  .editor-wrap{grid-template-columns:1fr}
  .editor-side{border-left:none;border-top:1px solid var(--line)}
}
@media(max-width:780px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .hamburger{display:block}
  .content{padding:18px}
  .btn{padding:14px 20px}
  table{font-size:.82rem}
  .hide-mobile{display:none}
}
</style>
</head>
<body>
<!-- ============ LOGIN ============ -->
<section id="login">
  <form class="login-card" id="loginForm" autocomplete="on">
    <span class="brand"><b>Rede Bolha</b> — Painel</span>
    <h1 class="serif">Bem-vindo de volta</h1>
    <p class="sub">Acesse o painel para gerenciar o conteúdo do site.</p>
    <div id="loginMsg"></div>
    <div class="field">
      <label for="email">E-mail</label>
      <input type="email" id="email" autocomplete="email" placeholder="seu@email.com" required>
    </div>
    <div class="field">
      <label for="token">Senha de acesso (token do GitHub)</label>
      <div class="pwd-wrap">
        <input type="password" id="token" autocomplete="current-password" placeholder="Cole aqui seu token" required>
        <button type="button" id="togglePwd" aria-label="Mostrar ou ocultar">Mostrar</button>
      </div>
    </div>
    <label class="remember"><input type="checkbox" id="remember"> Lembrar-me neste dispositivo</label>
    <button type="submit" class="btn" style="width:100%;justify-content:center" id="loginBtn">Entrar com segurança</button>
    <p class="login-help">
      Esqueceu o acesso? Gere um novo token pessoal em
      <a href="https://github.com/settings/tokens" target="_blank" rel="noopener">github.com/settings/tokens</a>.
      Seu token fica guardado apenas neste navegador e nunca é enviado a terceiros.
    </p>
  </form>
</section>
<!-- App is built dynamically by app.js -->
<div id="app"></div>
<div id="modals"></div>
<div id="toasts"></div>
<script src="app.js"></script>
</body>
</html>
